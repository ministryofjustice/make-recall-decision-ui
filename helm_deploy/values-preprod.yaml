# Per environment values which override defaults in make-recall-decision-ui/values.yaml

generic-service:
  ingress:
    host: consider-a-recall-preprod.hmpps.service.justice.gov.uk
    contextColour: green

  env:
    INGRESS_URL: "https://consider-a-recall-preprod.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api-preprod.prison.service.justice.gov.uk"
    MAKE_RECALL_DECISION_API_URL: "http://make-recall-decision-api.make-recall-decision-preprod.svc.cluster.local"
    MANAGE_USERS_API_URL: "https://manage-users-api-preprod.hmpps.service.justice.gov.uk"
    MAKE_RECALL_DECISIONS_AND_DELIUS_API_URL: "https://make-recall-decisions-and-delius-preprod.hmpps.service.justice.gov.uk"
    COMPONENT_API_URL: "https://probation-frontend-components-preprod.hmpps.service.justice.gov.uk"
    FLIPT_SERVER_URL: "https://feature-toggles-preprod.hmpps.service.justice.gov.uk/"
    FLIPT_NAMESPACE: "consider-a-recall"
    SENTRY_ENVIRONMENT: "PRE-PROD"
    ENVIRONMENT: "preprod"
    FEATURE_FLAG_QUERY_PARAMETERS_ENABLED: true
    FEATURE_FLAGFTR56ENABLED: "2026-03-30T23:00Z" # Midnight BST on 31st March 2026

  allowlist:
    north_shields_user: 194.33.192.1/24
    kettering_user: 194.33.196.4/24
    ark-dom1-farnborough: 194.33.192.0/24
    groups:
      - internal
      - prisons # do not remove, the prisons group also covers probation
      - probation

  scheduledDowntime:
    enabled: true

generic-prometheus-alerts:
  businessHoursOnly: true
  alertSeverity: make-recall-decision-nonprod
