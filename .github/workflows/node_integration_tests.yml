name: Integration tests

on:
  workflow_call

jobs:
  get-timings:
    uses: ministryofjustice/hmpps-assess-risks-and-needs-github-actions/.github/workflows/cypress_get_timings.yml@v1
    permissions:
      contents: read
    with:
      spec-file-patterns: 'integration_tests/integration/**/*.spec.ts'
      timings-cache-key: 'integration-test-timings'

  integration_tests:
    name: 'Run the integration tests'
    runs-on: ubuntu-latest
    services:
      redis:
        image: 'redis:7.4.2'
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    needs: get-timings
    strategy:
      fail-fast: false
      matrix:
        container: [ 1, 2, 3, 4, 5, 6, 7, 8 ]
    outputs:
      timings-1: ${{ steps.timings.outputs.t1 }}
      timings-2: ${{ steps.timings.outputs.t2 }}
      timings-3: ${{ steps.timings.outputs.t3 }}
      timings-4: ${{ steps.timings.outputs.t4 }}
      timings-5: ${{ steps.timings.outputs.t5 }}
      timings-6: ${{ steps.timings.outputs.t6 }}
      timings-7: ${{ steps.timings.outputs.t7 }}
      timings-8: ${{ steps.timings.outputs.t8 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
      - name: download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm_build_artifacts
      - name: restore cache
        id: restore-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          cache-name: node-modules # as named in HMPPS's node_build.yml
        with:
          path: |
            ./node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json', '!**/node_modules/**') }}
      - name: Install wiremock
        id: install-wiremock
        uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/tool-installers/setup-wiremock@c9b92b85a2aa7e313fb377a81fec08dd4f6f15b8 # v1.0.8
      - name: Run wiremock
        shell: bash
        run: |
          nohup java -jar ${{ steps.install-wiremock.outputs.jar_path }} --port 9091 --verbose &
          sleep 5
      - uses: ministryofjustice/hmpps-assess-risks-and-needs-github-actions/.github/actions/cypress/create_timings_file@bd2ccc17cfc6c285638a4be7bbb280527a30c328 # v1.1.0
        with:
          timings: ${{ needs.get-timings.outputs.timings }}
      - name: Run the tests
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7.1.9
        with:
          publish-summary: false
          browser: chrome
          config-file: 'integration_tests/cypress.config.ts'
          spec: 'integration_tests/integration/**/*.spec.ts'
          start: npm run start-feature
          wait-on: http://localhost:3007/ping
        env:
          # used to split the tests by times for parallel runs
          SPLIT: ${{ strategy.job-total }}
          SPLIT_INDEX: ${{ strategy.job-index }}
          SPLIT_FILE: 'timings.json'
          # enabled so the UI app can be tested with different flags
          FEATURE_FLAG_QUERY_PARAMETERS_ENABLED: true

      - name: Output updated timings
        if: success() || failure()
        id: timings
        run: echo "t${{ matrix.container }}=$(jq -c . < timings.json)" >> $GITHUB_OUTPUT

      - name: upload results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: 'npm_integration_test_artifacts_${{ strategy.job-index }}'
          path: |
            integration_tests/videos/
            integration_tests/screenshots/
            coverage/
            test_results/
            ctrf/
      - name: publish test report
        if: ${{ !cancelled() && github.event.repository.visibility == 'public' }}
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          artifact: 'npm_integration_test_artifacts_${{ strategy.job-index }}'
          name: Integration Test Report
          path: 'test_results/**/*.xml'
          reporter: java-junit
          fail-on-empty: false
          fail-on-error: false
          list-suites: 'failed'
          list-tests: 'failed'
      - name: fail the action if the tests failed
        if: ${{ steps.integration-tests.outcome == 'failure' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.setFailed('Integration tests failed')
  save-timings:
    if: success() || failure()
    uses: ministryofjustice/hmpps-assess-risks-and-needs-github-actions/.github/workflows/cypress_save_timings.yml@v1
    permissions:
      actions: write
    needs:
      - get-timings
      - integration_tests
    with:
      initial-timings: ${{ needs.get-timings.outputs.timings }}
      updated-timings: ${{ toJSON(needs.integration_test.outputs) }}
      timings-cache-key: 'integration-test-timings'
