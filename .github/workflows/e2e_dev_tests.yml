name: e2e dev tests

on: [workflow_call,workflow_dispatch]

jobs:
  e2e_dev_tests:
    name: e2e dev tests
    runs-on: [self-hosted, Linux, X64, hmpps-github-actions-runner]
    environment: dev
    steps:
      - name: Checkout make-recall-decision-e2e-tests repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: 'ministryofjustice/make-recall-decision-e2e-tests'
          path: 'make-recall-decision-e2e-tests'
          persist-credentials: false
      - name: Use Node.js .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'make-recall-decision-e2e-tests/.nvmrc'
      - name: Install npm
        working-directory: make-recall-decision-e2e-tests
        shell: bash
        run: npm install -g npm@11
      # Starting with v25.0.0 of badeball/cypress-cucumber-preprocessor, used by the e2e-tests repo, the tags
      # environment variable must be passed in lowercase. The 'env' option in GitHub Actions (which we are using in the
      # step following this one) always converts environment variable names to uppercase, so we need to set the tags
      # environment variable in a separate step to avoid it being converted to uppercase.
      - name: Set tags environment variable
        working-directory: make-recall-decision-e2e-tests
        run: |
          echo "tags=@E2E" >> $GITHUB_ENV
      - name: Run the tests against dev
        id: e2e_tests
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7.1.9
        with:
          working-directory: make-recall-decision-e2e-tests
          publish-summary: false
          browser: chrome
          config-file: 'e2e_tests/cypress.config.ts'
          config: baseUrl=https://make-recall-decision-dev.hmpps.service.justice.gov.uk
          install-command: npm run setup
        env:
          # used by the tests to determine which CRNs to use
          ENV: 'dev' # I expected to need to set CYPRESS_ENV here, but only ENV worked
          # credentials and other config values for running tests against dev environment
          CYPRESS_USERNAME_PO: ${{secrets.dev_USERNAME_PO}}
          CYPRESS_PASSWORD_PO: ${{secrets.dev_PASSWORD_PO}}
          CYPRESS_USERNAME_SPO: ${{secrets.dev_USERNAME_SPO}}
          CYPRESS_PASSWORD_SPO: ${{secrets.dev_PASSWORD_SPO}}
          CYPRESS_USERNAME_ACO: ${{secrets.dev_USERNAME_ACO}}
          CYPRESS_PASSWORD_ACO: ${{secrets.dev_PASSWORD_ACO}}
          CYPRESS_USERNAME_PPCS: ${{secrets.dev_USERNAME_PPCS}}
          CYPRESS_PASSWORD_PPCS: ${{secrets.dev_PASSWORD_PPCS}}
          CYPRESS_API_CLIENT_ID: ${{secrets.dev_API_CLIENT_ID}}
          CYPRESS_API_CLIENT_SECRET: ${{secrets.dev_API_CLIENT_SECRET}}
          CYPRESS_MAKE_RECALL_DECISION_API_URL: ${{secrets.dev_MAKE_RECALL_DECISION_API_URL}}
          CYPRESS_HMPPS_AUTH_EXTERNAL_URL: ${{secrets.dev_HMPPS_AUTH_EXTERNAL_URL}}
      - name: Upload screenshots
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: screenshots
          path: make-recall-decision-e2e-tests/e2e_tests/screenshots/
      - name: Upload videos
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: videos
          path: make-recall-decision-e2e-tests/e2e_tests/videos/
      - name: Upload test logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs
          path: make-recall-decision-e2e-tests/e2e_tests/logs/
      - name: Upload JUnit results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit
          path: make-recall-decision-e2e-tests/e2e_tests/junit/
      - name: Publish test report
        if: ${{ !cancelled() && github.event.repository.visibility == 'public' }}
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          artifact: ${{ inputs.test_results_artifact_name }}
          working-directory: make-recall-decision-e2e-tests
          name: Dev e2e Test Report
          path: 'e2e_tests/junit/**/*.xml'
          reporter: java-junit
          fail-on-empty: false
          fail-on-error: false
          list-suites: 'failed'
          list-tests: 'failed'
      - name: fail the action if the tests failed
        if: ${{ steps.e2e_tests.outcome == 'failure' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.setFailed('e2e tests failed')
